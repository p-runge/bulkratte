services:
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_db:/var/lib/postgresql/data
      - ./scripts/db/docker-init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/bulkratte-dev;
      /usr/bin/mc mb --ignore-existing local/bulkratte-core-dev;
      exit 0;
      "

volumes:
  postgres_db:
  minio_data:
